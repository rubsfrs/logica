<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Switch/Case</title>
</head>
<body>
    <h1>Testando comandos switch/case</h1>

    <script>
        let DiaSemana = parseInt(prompt("Digite um número de 1 a 7 para saber o dia da semana: ")) //parseInt serve para converter a string digitada pelo usuário em um número inteiro
        let NomeDia

        switch(DiaSemana){
            case 1: NomeDia = "Domingo" //case é usado para criar uma condição, ou seja, se o número digitado for 1, o nome do dia será Domingo
            break;
            case 2: NomeDia = "Segunda-feira"
            break;
            case 3: NomeDia = "Terça-feira"
            break;
            case 4: NomeDia = "Quarta-feira"
            break;
            case 5: NomeDia = "Quinta-feira"
            break;
            case 6: NomeDia = "Sexta-feira"
            break;
            case 7: NomeDia = "Sábado"
            break;
            default: alert("Número inexistente! Digite um número de 1 a 7.")
        }

        document.write(NomeDia)
    </script>
</body>
</html>
