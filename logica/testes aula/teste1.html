<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando exemplos de Javascript</title>
</head>
<body>
    <h1>Testando modos de saída no javascript</h1>

    <script>
        document.write("Exibindo um texto na página usando JS!!") /* document.write Exibe um texto na página */
        alert("Exibindo uma alert usando o JS!") /* alert serve para exibir uma caixa na tela com um texto */
        console.log("Testando exibição de mensagem pelo console.log") /* console.log exibe uma mensagem no F12 do navegador, no console */
    </script>
</body>
</html>
