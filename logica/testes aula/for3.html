<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando FOR - Exibindo números de 1 a 100</title>
</head>
<body>
    <h1>Exibindo números de 1 a 100</h1>

    <script>
        for(let n=0; n<=100; n+=2){ // n+=2 serve para adicionar +2 à contagem, serve para outros números também
            document.write(n + "<br>")
        }
    </script>
</body>
</html>
