<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando DO WHILE</title>
</head>
<body>
    <h1>Testando o comando DO WHILE</h1>

    <script>

        let tabuada = parseInt(prompt("Digite a tabuada desejada: "))
        let n = 1
        
        do{
            document.write(n + " x " + tabuada + " = " + tabuada * n + "<br>")
            n++
        } while (n <=10)

    </script>
</body>
</html>
