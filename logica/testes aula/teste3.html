<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando cálculos usando javascript</title>
</head>
<body>
    
    <script>
        let num1 = 20
        let num2 = 40

        let soma = num1 + num2 // soma os dois números
        let subtracao = num1 - num2 // subtrai os dois números
        let multiplicacao = num1 * num2 // multiplica os dois números
        let divisao = num1 / num2 // divide os dois números
        let media = (num1 + num2) / 2 // calcula a média dos dois números

        document.write("A soma dos números é: " + soma)
        document.write("<br>A subtração dos números é: " + subtracao)
        document.write("<br>A multiplicação dos números é: " + multiplicacao)
        document.write("<br>A divisão dos números é: " + divisao)
        document.write("<br>A média dos números é: " + media)

    </script>

</body>
</html>
