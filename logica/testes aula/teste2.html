<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comandos usando javascript</title>
</head>
<body>
    <h1>Testando comandos usando javascript</h1>

    <script>
        let nome = "Rubens" // variável do tipo string (letras, números e caracteres especiais)
        let idade = 20 // variável do tipo int (números sem casas decimais)
        let altura = 1.80 // variável do tipo float (com casas decimais)
        let salario = 38000.55 // variável do tipo double (com casas decimais, usam mais espaço na memória que o float)
        let mestrado = false // variável do tipo boolean (verdadeiro ou falso)

        document.write("Meu nome é: " + nome)
        document.write("<br>Minha idade é: " + idade)
        document.write("<br>Minha altura é: " + altura)
        document.write("<br>Meu salário é: " + salario)
        document.write("<br>Tenho mestrado? " + mestrado)

        let nome1 = "Maria"
        let idade1 = 27
        let altura1 = 1.65
        let salario1 = 15430.99
        let mestrado1 = true

        document.write("<br><br>Meu nome é: " + nome1)
        document.write("<br>Minha idade é: " + idade1)  
        document.write("<br>Minha altura é: " + altura1)
        document.write("<br>Meu salário é: " + salario1)
        document.write("<br>Tenho mestrado? " + mestrado1)
        
    </script>
</body>
</html>
