<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora da soma de 10 números</title>
</head>
<body>
    <h1>Calculadora da soma de 10 números</h1>

    <script>
        let num1 = parseFloat(prompt("Digite o primeiro número: "))
        let num2 = parseFloat(prompt("Digite o segundo número: "))
        let num3 = parseFloat(prompt("Digite o terceiro número: "))
        let num4 = parseFloat(prompt("Digite o quarto número: "))
        let num5 = parseFloat(prompt("Digite o quinto número: "))
        let num6 = parseFloat(prompt("Digite o sexto número: "))
        let num7 = parseFloat(prompt("Digite o sétimo número: "))
        let num8 = parseFloat(prompt("Digite o oitavo número: "))
        let num9 = parseFloat(prompt("Digite o nono número: "))
        let num10 = parseFloat(prompt("Digite o décimo número: "))

        let soma = num1 + num2 + num3 + num4 + num5 + num6 + num7 + num8 + num9 + num10

        document.write("A soma de todos os números é: " + soma)
    </script>
</body>
</html>
