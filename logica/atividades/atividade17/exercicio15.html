<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora soma da idade de 20 pessoas</title>
</head>
<body>
    <h1>Calculadora da soma da idade de 20 pessoas</h1>

    <script>
        let idade1 = parseFloat(prompt("Digite a idade da primeira pessoa: "))
        let idade2 = parseFloat(prompt("Digite a idade da segunda pessoa: "))
        let idade3 = parseFloat(prompt("Digite a idade da terceira pessoa: "))
        let idade4 = parseFloat(prompt("Digite a idade da quarta pessoa: "))
        let idade5 = parseFloat(prompt("Digite a idade da quinta pessoa: "))
        let idade6 = parseFloat(prompt("Digite a idade da sexta pessoa: "))
        let idade7 = parseFloat(prompt("Digite a idade da sétima pessoa: "))
        let idade8 = parseFloat(prompt("Digite a idade da oitava pessoa: "))
        let idade9 = parseFloat(prompt("Digite a idade da nona pessoa: "))
        let idade10 = parseFloat(prompt("Digite a idade da décima pessoa: "))
        let idade11 = parseFloat(prompt("Digite a idade da décima primeira pessoa: "))
        let idade12 = parseFloat(prompt("Digite a idade da décima segunda pessoa: "))
        let idade13 = parseFloat(prompt("Digite a idade da décima terceira pessoa: "))
        let idade14 = parseFloat(prompt("Digite a idade da décima quarta pessoa: "))
        let idade15 = parseFloat(prompt("Digite a idade da décima quinta pessoa: "))
        let idade16 = parseFloat(prompt("Digite a idade da décima sexta pessoa: "))
        let idade17 = parseFloat(prompt("Digite a idade da décima sétima pessoa: "))
        let idade18 = parseFloat(prompt("Digite a idade da décima oitava pessoa: "))
        let idade19 = parseFloat(prompt("Digite a idade da décima nona pessoa: "))
        let idade20 = parseFloat(prompt("Digite a idade da vigésima pessoa: "))

        let soma = idade1 + idade2 + idade3 + idade4 + idade5 + idade6 + idade7 + idade8 + idade9 + idade10 + idade11 + idade12 + idade13 + idade14 + idade15 + idade16 + idade17 + idade18 + idade19 + idade20

        document.write("A soma de todas as idades é: " + soma)
    </script>
</body>
</html>
