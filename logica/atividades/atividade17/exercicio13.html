<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Celsius para Fahrenheit</title>
</head>
<body>
    <h1>Conversor Celsius para Fahrenheit</h1>

    <script>
        let celsius = parseFloat(prompt("Digite a temperatura em Celsius: "))
        let fahrenheit = (celsius * 1.8) + 32
        
        document.write(celsius + "°C é igual a " + fahrenheit + "°F.")
    </script>
</body>
</html>
