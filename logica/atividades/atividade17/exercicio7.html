<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de médias</title>
</head>
<body>
    <h1>Calculadora de Médias</h1>

    <script>
        let num8 = 8
        let num9 = 9
        let num7 = 7

        let num4 = 4
        let num5 = 5
        let num6 = 6

        let Media1 = (num8 + num9 + num7) / 3
        let Media2 = (num4 + num5 + num6) / 3
        let SomaMedia = Media1 + Media2
        let MediaTotal = (Media1 + Media2) / 2

        document.write("A média dos números 8, 9 e 7 é: " + Media1)
        document.write("<br>A média dos números 4, 5 e 6 é: " + Media2)
        document.write("<br>A soma das duas médias é: " + SomaMedia)
        document.write("<br>A média das médias é: " + MediaTotal)
    </script>
</body>
</html>
