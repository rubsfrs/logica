<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <script>
        let valor1 = parseInt(prompt("Digite o primeiro número: "))
        let valor2 = parseInt(prompt("Digite o segundo valor: "))

        while (valor2 <= 0){
            alert("O segundo valor NÃO deve ser igual ou menor que zero.")
            valor2 = parseInt(prompt("Digite o segundo valor novamente: "))
        }

        let resultadoDivisao = valor1 / valor2;
        alert("O resultado da divisão é: " + resultadoDivisao);

    </script>
</body>
</html>
