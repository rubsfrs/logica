<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <script>

        let valor1 = parseInt(prompt("Digite o primeiro valor: "))
        let valor2 = parseInt(prompt("Digite o segundo valor: "))

        let soma = 0;
        let contador = 0;
         
        for(let n = valor1; n <= valor2; n++){
            soma += n;
            contador++;
        }

        let media = soma / contador;

        document.write("A média aritmética dos números entre" + valor1 + "e " + valor2 + " é: " + media);
    </script>
</body>
</html>
