<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 4</title>
</head>
<body>
    <script>
        let soma = 0;
        let contador = 0;
         
        for(let n = 15; n <= 100; n++){
            soma += n;
            contador++;
        }

        let media = soma / contador;

        document.write("A média aritmética dos números entre 15 e 100 é: " + media)
    </script>
</body>
</html>
