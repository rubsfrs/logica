<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reajuste de saldo</title>
</head>
<body>
    <h1>Calculadora de Reajuste de Saldo</h1>

    <script>
        let saldo = parseFloat(prompt("Digite o saldo atual: "))

        let reajuste = saldo * 1.01 // 1.01 representa 100% do saldo mais 1% de reajuste
        document.write("O saldo reajustado é: " + reajuste)

    </script>
</body>
</html>
