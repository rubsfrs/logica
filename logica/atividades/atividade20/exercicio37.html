<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 37</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let divisores = 0;

        for (let i = 1; i <= num; i++) {
            if (num % i === 0) divisores++;
        }

        console.log(divisores === 2 ? "Primo" : "Não é primo");
    </script>
</body>
</html>
