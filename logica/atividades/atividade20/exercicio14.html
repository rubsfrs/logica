<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 14</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let fatorial = 1;
        let i = num;

        while (i > 1) {
            fatorial *= i;
            i--;
        }

        console.log(fatorial);
    </script>
</body>
