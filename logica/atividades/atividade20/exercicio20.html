<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 20</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let i = 1;

        do {
            console.log(`${num} x ${i} = ${num * i}`);
            i++;
        } while (i <= 10);
    </script>
</body>
</html>
