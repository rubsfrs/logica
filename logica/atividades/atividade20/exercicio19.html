<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 19</title>
</head>
<body>
    <script>
        let soma = 0;
        let contador = 0;

        do {
            let numero = parseInt(prompt("Digite um número inteiro:"));
            soma += numero;
            contador++;
        } while (contador < 5);

        console.log(soma / 5);
    </script>
</body>
</html>
