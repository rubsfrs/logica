<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 22</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let divisor = 2;
        let primo = num > 1;

        if (num > 2) {
            do {
                if (num % divisor === 0) {
                    primo = false;
                    break;
                }
                divisor++;
            } while (divisor < num);
        }

        console.log(primo ? "É primo" : "Não é primo");
    </script>
</body>
</html>
