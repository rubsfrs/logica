<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 26</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let soma = 0;
        let i = 2;

        if (num >= 2) {
            do {
                soma += i;
                i += 2;
            } while (i <= num);
        }

        console.log(soma);
    </script>
</body>
</html>
