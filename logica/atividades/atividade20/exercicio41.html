<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 41</title>
</head>
<body>
    <script>
        let limite = parseInt(prompt("Número:"));
        let soma = 0;
        
        for (let i = 1; i <= limite; i++) {
            if (i % 2 === 0) soma += i;
        }

        console.log(soma);
    </script>
</body>
</html>
