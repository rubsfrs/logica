<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 08</title>
</head>
<body>
    <script>
        let limite = parseInt(prompt("Digite um número:"));
        let a = 0, b = 1;

        while (a <= limite) {
            console.log(a);
            let proximo = a + b;
            a = b;
            b = proximo;
        }
    </script>
</body>
</html>
