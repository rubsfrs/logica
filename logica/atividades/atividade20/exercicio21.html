<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 21</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número inteiro:"));
        let i = 1;

        do {
            if (num % i === 0) {
                console.log(i);
            }
            i++;
        } while (i <= num);
    </script>
</body>
</html>
