<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04</title>
</head>
<body>
    <script>
        let contador = 1;
        let soma = 0;

        while (contador <= 5) {
        let num = parseInt(prompt("Digite um número:"));
        soma += num;
        contador++;
        }

        console.log("A média é:", soma / 5);
    </script>
</body>
</html>
