<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 06</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let i = 1;

        while (i <= num) {
            if (num % i === 0) {
                console.log(i);
            }
            i++;
        }
    </script>
</body>
