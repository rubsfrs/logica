<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 34</title>
</head>
<body>
    <script>
        let soma = 0;

        for (let i = 1; i <= 5; i++) {
            let numero = parseInt(prompt(`Digite o ${i}º número inteiro:`));
            soma += numero;
        }

        let media = soma / 5;
        
        console.log("A média aritmética é: " + media);
    </script>
</body>
</html>
