<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Mamão com Açúcar</title>
</head>
<body>
    <h1>Calculadora de parcelas da Loja Mamão com Açúcar</h1>

    <script>
        let valorCompra = parseFloat(prompt("Digite o valor da compra: "))
        let valorParcela = valorCompra / 5

        document.write("O valor total da compra é: R$ " + valorCompra.toFixed(2))
        document.write("<br>A compra ficará em 5 parcelas sem juros de R$ " + valorParcela.toFixed(2))
    </script>
</body>
</html>
